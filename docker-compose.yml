services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: canopy
      POSTGRES_USER: canopy
      POSTGRES_PASSWORD: canopy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canopy"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --workspace=apps/api --workspace=packages/types && npm run dev:api"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://canopy:canopy@postgres:5432/canopy
      JWT_SECRET: local-dev-secret-change-me
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --workspace=apps/ui --workspace=packages/types && npm run dev:ui"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

volumes:
  pgdata:
  node_modules:
